<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{

background:linear-gradient(
135deg,
#141E30,
#243B55,
#0F2027
);

height:100vh;

overflow:hidden;

}

.login-card{

background:rgba(255,255,255,0.1);

backdrop-filter:blur(15px);

border-radius:25px;

padding:40px;

margin-top:100px;

color:white;

box-shadow:0px 10px 30px rgba(0,0,0,0.5);

animation:slide 1.5s;

}

h1{

font-weight:bold;

text-shadow:0px 0px 15px cyan;

animation:floating 2s infinite alternate;

}

.btn-custom{

border-radius:25px;

transition:0.5s;

}

.btn-custom:hover{

transform:scale(1.1);

}

.hover-text{

color:cyan;

transition:0.5s;

}

.hover-text:hover{

letter-spacing:3px;

color:white;

}

@keyframes slide{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@keyframes floating{

from{

transform:translateY(0px);

}

to{

transform:translateY(-8px);

}

}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="login-card">

<h1 class="text-center">

🚦 Smart Traffic System

</h1>

<p class="text-center hover-text">

AI Powered Traffic Prediction

</p>

<form method="POST">

<input type="text"
name="username"
placeholder="Username"
class="form-control mb-3"
required>

<input type="password"
name="password"
placeholder="Password"
class="form-control mb-3"
required>

<button class="btn btn-info btn-custom w-100">

Login

</button>

</form>

<br>

<p class="text-center">

Don't have an account?

<a href="/register">

Register Here

</a>

</p>

</div>

</div>

</div>

</div>

</body>

</html>
