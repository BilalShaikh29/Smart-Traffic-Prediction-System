<!DOCTYPE html>
<html>

<head>

<title>Smart Traffic Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{

background:linear-gradient(
135deg,
#141e30,
#243b55,
#0f2027
);

min-height:100vh;

font-family:Arial,sans-serif;

overflow:hidden;

}

.main-card{

background:rgba(255,255,255,0.1);

backdrop-filter:blur(15px);

border-radius:25px;

padding:40px;

margin-top:70px;

color:white;

box-shadow:0px 10px 30px rgba(0,0,0,0.5);

animation:fadeIn 1.5s;

}

.feature-card{

background:rgba(255,255,255,0.15);

border-radius:20px;

padding:30px;

transition:0.5s;

color:white;

height:100%;

}

.feature-card:hover{

transform:translateY(-10px);

box-shadow:0px 10px 25px cyan;

cursor:pointer;

}

.btn-custom{

border:none;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

transition:0.5s;

}

.btn-custom:hover{

transform:scale(1.1);

}

.title{

font-size:40px;

font-weight:bold;

text-shadow:2px 2px 10px cyan;

}

.icon{

font-size:50px;

margin-bottom:20px;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">

<div class="main-card">

<h1 class="text-center title">

🚦 Smart Traffic Prediction Dashboard

</h1>

<hr style="color:white;">

<h3 class="text-center">

Welcome {{username}}

</h3>

<br><br>

<div class="row">

<div class="col-md-6">

<div class="feature-card text-center">

<div class="icon">

<i class="fas fa-chart-line"></i>

</div>

<h3>

Traffic Prediction

</h3>

<p>

Predict traffic congestion and vehicle count using machine learning.

</p>

<a href="/predict">

<button class="btn btn-info btn-custom">

Show Prediction

</button>

</a>

</div>

</div>


<div class="col-md-6">

<div class="feature-card text-center">

<div class="icon">

<i class="fas fa-sign-out-alt"></i>

</div>

<h3>

Logout

</h3>

<p>

Securely logout from your system.

</p>

<a href="/logout">

<button class="btn btn-danger btn-custom">

Logout

</button>

</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
